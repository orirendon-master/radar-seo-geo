<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Archivo — Search Engine Marketing / Weekly Radar</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400;1,500&display=swap');

  :root{
    --ink:#26262E;
    --ink-soft:#3A3A44;
    --muted:#74747F;
    --page:#FBF7FD;
    --card:#FFFFFF;
    --hair:#EEE6F3;
    --blue:#B9D2F6;
    --blue-deep:#8FB2EC;
    --pink:#F6C8DE;
    --pink-deep:#EC9CC2;
    --lilac:#D2C1F3;
    --lilac-deep:#AC8DE6;
    --mint:#BFE6DE;
    --mint-deep:#7FC4B8;
    --peri:#C6C9F2;
    --peri-deep:#9096E0;
  }

  *{box-sizing:border-box;}
  html{-webkit-text-size-adjust:100%;}
  body{
    margin:0;
    background:var(--page);
    color:var(--ink);
    font-family:'Montserrat',system-ui,sans-serif;
    font-size:16.5px;
    line-height:1.62;
    -webkit-font-smoothing:antialiased;
  }
  .wrap{max-width:820px;margin:0 auto;padding:0 20px 60px;}

  .masthead{
    margin:0 -20px 30px;
    padding:26px 30px 22px;
    background:linear-gradient(115deg,#CFE0FB 0%,#E3D4F7 48%,#F9D6E9 100%);
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:20px;
    border-radius:0 0 4px 4px;
  }
  .mast-title{
    font-weight:800;font-size:26px;line-height:1.03;letter-spacing:-0.02em;margin:0;color:var(--ink);
  }
  .mast-title .slash{color:var(--lilac-deep);}
  .mast-sub{
    font-weight:600;font-size:11px;letter-spacing:0.14em;text-transform:uppercase;color:var(--ink-soft);margin-top:8px;
  }
  .back{
    font-weight:700;font-size:11px;color:var(--ink);text-decoration:none;
    padding:6px 14px;border-radius:20px;background:rgba(255,255,255,0.65);white-space:nowrap;
  }
  .back:hover{background:#fff;}

  .edition{
    background:var(--card);
    border:1px solid var(--hair);
    border-left:5px solid var(--lilac-deep);
    border-radius:8px;
    margin-bottom:18px;
    overflow:hidden;
  }
  .ed-head{
    width:100%;
    display:flex;flex-wrap:wrap;align-items:baseline;gap:6px 14px;
    padding:16px 20px;
    background:none;border:none;cursor:pointer;text-align:left;
    font-family:inherit;
  }
  .ed-head:hover{background:#FCF9FE;}
  .ed-num{font-weight:800;font-size:12px;color:var(--lilac-deep);letter-spacing:0.06em;}
  .ed-week{font-weight:700;font-size:15px;color:var(--ink);}
  .ed-hl{flex-basis:100%;font-weight:500;font-size:13.5px;color:var(--ink-soft);line-height:1.45;}
  .ed-count{margin-left:auto;font-weight:700;font-size:11px;color:var(--muted);}
  .ed-body{display:none;padding:0 20px 18px;border-top:1px solid var(--hair);}
  .edition.open .ed-body{display:block;}

  .sec-label{
    display:inline-block;
    font-weight:800;font-size:11px;letter-spacing:0.03em;color:var(--ink);
    padding:3px 11px;border-radius:20px;margin:18px 0 4px;
  }
  .sec-label.organic{background:var(--blue);}
  .sec-label.paid{background:var(--pink);}
  .sec-label.geo{background:var(--lilac);}
  .sec-label.social{background:var(--mint);}
  .sec-label.ciencia{background:var(--peri);}
  .sec-label.senal{background:linear-gradient(120deg,var(--blue),var(--pink));}
  .sec-label.radar{background:linear-gradient(160deg,#E9DFFa,#F7DEEC);}

  .a-item{padding:10px 0;border-bottom:1px solid var(--hair);}
  .a-item:last-child{border-bottom:none;}
  .a-item h3{font-weight:700;font-size:15.5px;line-height:1.3;margin:0 0 3px;color:var(--ink);}
  .a-item p{margin:0 0 6px;font-size:13.5px;color:var(--ink-soft);}
  .a-meta{display:flex;flex-wrap:wrap;align-items:center;gap:8px;font-weight:600;font-size:11px;color:var(--muted);}
  .chip{padding:1px 8px;border-radius:20px;letter-spacing:0.04em;color:var(--ink);}
  .chip.en{background:var(--blue);}
  .chip.es{background:var(--pink);}
  .a-meta a{color:var(--muted);text-decoration:none;border-bottom:1px dotted var(--muted);}
  .a-meta a:hover{color:var(--ink);border-color:var(--ink);}

  .empty,.error{
    padding:30px;text-align:center;font-weight:600;font-size:13px;color:var(--muted);
    background:var(--card);border:1px dashed var(--hair);border-radius:8px;
  }

  .foot{
    margin-top:26px;padding-top:16px;border-top:1px solid var(--hair);
    font-weight:600;font-size:11px;color:var(--muted);letter-spacing:0.02em;line-height:1.75;
  }
  .foot b{color:var(--ink);font-weight:800;}
  .foot a{color:var(--muted);border-bottom:1px dotted var(--muted);text-decoration:none;}
  .foot a:hover{color:var(--ink);border-color:var(--ink);}

  @media (max-width:620px){
    .masthead{flex-direction:column;align-items:flex-start;}
    .mast-title{font-size:22px;}
  }
</style>
</head>
<body>
<div class="wrap">

  <header class="masthead">
    <div>
      <h1 class="mast-title">Search Engine Marketing <span class="slash">/</span> Weekly Radar</h1>
      <div class="mast-sub">Archivo de ediciones anteriores</div>
    </div>
    <a class="back" href="index.html">← Edición actual</a>
  </header>

  <div id="list"><div class="empty">Cargando ediciones…</div></div>

  <div class="foot">
    <b>Search Engine Marketing / Weekly Radar</b> — archivo histórico.<br>
    Cada edición guarda titulares, resúmenes y links a las fuentes originales.
    Hecho por <a href="https://www.linkedin.com/in/orian-rendon/" target="_blank" rel="noopener">Oriana Rendón</a>.
  </div>

</div>

<script>
const SEC_CLASS = {
  'SEÑAL DE LA SEMANA':'senal','ORGANIC':'organic','PAID':'paid',
  'GEO':'geo','SOCIAL':'social','CIENCIA':'ciencia','EN EL RADAR':'radar'
};
const esc = s => String(s ?? '').replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));

async function init(){
  const list = document.getElementById('list');
  try{
    const res = await fetch('archivo/index.json', {cache:'no-store'});
    if(!res.ok) throw new Error(res.status);
    const eds = (await res.json()).sort((a,b)=> b.fecha.localeCompare(a.fecha));
    if(!eds.length){ list.innerHTML = '<div class="empty">Aún no hay ediciones archivadas.</div>'; return; }
    list.innerHTML = eds.map(e => `
      <div class="edition" data-file="archivo/${esc(e.archivo)}">
        <button class="ed-head" type="button">
          <span class="ed-num">EDICIÓN #${String(e.edicion).padStart(2,'0')}</span>
          <span class="ed-week">Semana del ${esc(e.semana)}</span>
          <span class="ed-count">${esc(e.total_items)} señales · abrir ↓</span>
          <span class="ed-hl">${esc(e.titular_destacado)}</span>
        </button>
        <div class="ed-body"></div>
      </div>`).join('');
    list.querySelectorAll('.ed-head').forEach(btn => btn.addEventListener('click', () => toggle(btn.parentElement)));
  }catch(err){
    list.innerHTML = '<div class="error">No se pudo cargar el archivo (archivo/index.json).</div>';
  }
}

async function toggle(card){
  const body = card.querySelector('.ed-body');
  if(card.classList.contains('open')){ card.classList.remove('open'); return; }
  if(!body.dataset.loaded){
    body.innerHTML = '<div class="empty" style="border:none;">Cargando…</div>';
    card.classList.add('open');
    try{
      const res = await fetch(card.dataset.file, {cache:'no-store'});
      if(!res.ok) throw new Error(res.status);
      const ed = await res.json();
      let html = '', lastSec = null;
      for(const it of ed.items){
        if(it.seccion !== lastSec){
          html += `<span class="sec-label ${SEC_CLASS[it.seccion] || 'organic'}">${esc(it.seccion)}</span>`;
          lastSec = it.seccion;
        }
        const fuentes = (it.fuentes || []).map(f => `<a href="${esc(f.url)}" target="_blank" rel="noopener">${esc(f.nombre)}</a>`).join(' · ');
        const chip = it.idioma ? `<span class="chip ${it.idioma.toLowerCase()}">${esc(it.idioma)}</span>` : '';
        html += `<div class="a-item"><h3>${esc(it.titular)}</h3><p>${esc(it.resumen)}</p><div class="a-meta">${chip}${fuentes}</div></div>`;
      }
      body.innerHTML = html;
      body.dataset.loaded = '1';
    }catch(err){
      body.innerHTML = '<div class="error" style="border:none;">No se pudo cargar esta edición.</div>';
    }
  }else{
    card.classList.add('open');
  }
}
init();
</script>
</body>
</html>
